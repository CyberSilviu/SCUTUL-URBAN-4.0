<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Scut Urban 4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #2563eb;
    --green:  #10b981;
    --text:   #0f172a;
    --text2:  #64748b;
    --bg:     #f8fafc;
    --border: #e2e8f0;
    --sat:    env(safe-area-inset-top, 0px);
    --sab:    env(safe-area-inset-bottom, 0px);
  }

  html, body { height: 100%; background: var(--bg); font-family: 'Barlow', sans-serif; color: var(--text); }

  /* ══════════════════════════════
     LANDING
  ══════════════════════════════ */
  #landing {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100dvh;
    padding: calc(24px + var(--sat)) 24px calc(24px + var(--sab));
    text-align: center; gap: 0;
  }

  .top-bar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: calc(12px + var(--sat)) 20px 12px;
    background: white; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); z-index: 10;
  }
  .top-bar-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: 1px;
  }
  .top-bar-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    color: var(--accent); background: rgba(37,99,235,0.1);
    border: 1px solid rgba(37,99,235,0.2); border-radius: 4px; padding: 2px 7px;
  }

  .main {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100%; max-width: 400px;
    gap: 32px; padding-top: 70px;
  }

  .shield-wrap { animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { filter: drop-shadow(0 4px 14px rgba(37,99,235,0.2)); }
    50%      { filter: drop-shadow(0 4px 24px rgba(37,99,235,0.45)); }
  }

  .app-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px; font-weight: 900; letter-spacing: -0.5px; line-height: 1;
  }
  .app-title span { color: var(--accent); }
  .app-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 300; letter-spacing: 4px;
    text-transform: uppercase; color: var(--text2); margin-top: 6px;
  }
  .app-desc { font-size: 14px; color: var(--text2); line-height: 1.6; max-width: 320px; }

  .buttons { display: flex; flex-direction: column; gap: 14px; width: 100%; }

  .app-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 22px; border-radius: 14px;
    border: none; cursor: pointer; width: 100%;
    text-align: left; transition: 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .app-btn:active { transform: scale(0.97); }
  .app-btn.seismic { background: var(--accent); box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
  .app-btn.air     { background: var(--green);  box-shadow: 0 4px 16px rgba(16,185,129,0.3); }

  .btn-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .btn-text { flex: 1; }
  .btn-label { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700; display: block; margin-bottom: 2px; color: white; }
  .btn-sub   { font-size: 12px; opacity: 0.8; display: block; color: white; }
  .btn-arrow { opacity: 0.7; flex-shrink: 0; }

  .live-row { display: flex; gap: 20px; justify-content: center; }
  .live-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
  .dot { width: 7px; height: 7px; border-radius: 50%; animation: blink 2s ease-in-out infinite; }
  .dot.blue  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .dot.green { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ══════════════════════════════
     VIEWER (iframe fullscreen)
  ══════════════════════════════ */
  #viewer {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    flex-direction: column;
    background: #fff;
  }
  #viewer.active { display: flex; }

  #viewer-bar {
    display: flex; align-items: center; gap: 12px;
    padding: calc(10px + var(--sat)) 16px 10px;
    background: white; border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    flex-shrink: 0; z-index: 10;
  }

  #btn-back {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--bg); color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent;
    transition: 0.15s;
  }
  #btn-back:active { background: var(--border); }

  #viewer-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; flex: 1; letter-spacing: 0.5px;
  }

  #viewer-frame-wrap {
    flex: 1; overflow: hidden; position: relative;
  }

  #viewer-frame {
    position: absolute;
    top: 0; left: 0;
    border: none;
  }

  /* Normal size (statie aer) */
  #viewer-frame.normal {
    width: 100%; height: 100%;
  }

  /* Scaled down (seismicwatch) — 80% zoom */
  #viewer-frame.scaled {
    width: 125%;
    height: 125%;
    transform: scale(0.8);
    transform-origin: top left;
  }
</style>
</head>
<body>

<!-- ══ LANDING ══ -->
<div id="landing">
  <div class="top-bar">
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
      <path d="M16 2L4 7v8c0 7.18 5.28 13.9 12 15.5C22.72 28.9 28 22.18 28 15V7L16 2z"
        fill="rgba(37,99,235,0.15)" stroke="#2563eb" stroke-width="1.5"/>
      <circle cx="16" cy="15" r="4" fill="#3b82f6" opacity="0.8"/>
    </svg>
    <span class="top-bar-name">SCUT URBAN</span>
    <span class="top-bar-badge">v4.0</span>
  </div>

  <div class="main">
    <div class="shield-wrap">
      <svg width="80" height="80" viewBox="0 0 100 100" fill="none">
        <path d="M50 5L10 20V45c0 22 15.6 43 40 50 24.4-7 40-28 40-50V20L50 5z"
          fill="rgba(37,99,235,0.12)" stroke="#2563eb" stroke-width="2"/>
        <path d="M50 18L22 28.5V45c0 14 8.4 27.2 28 33 19.6-5.8 28-19 28-33V28.5L50 18z"
          fill="rgba(37,99,235,0.2)" stroke="#3b82f6" stroke-width="1.5"/>
        <polyline points="28,50 33,50 36,42 40,58 44,46 48,52 52,52 56,44 60,58 64,48 67,50 72,50"
          stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="44" cy="66" r="3" fill="#34d399"/>
        <circle cx="50" cy="62" r="3" fill="#34d399"/>
        <circle cx="56" cy="66" r="3" fill="#34d399"/>
      </svg>
    </div>

    <div>
      <div class="app-title">SCUT URBAN <span>4.0</span></div>
      <div class="app-subtitle">Monitorizare Urbană</div>
    </div>

    <p class="app-desc">Platformă integrată pentru siguranța cetățenilor — monitorizare seismică și calitate aer în timp real.</p>

    <div class="buttons">
      <button class="app-btn seismic" onclick="openModule('https://seismicwatch.netlify.app/', 'SeismicWatch', 'scaled')">
        <div class="btn-icon">🌍</div>
        <div class="btn-text">
          <span class="btn-label">SeismicWatch</span>
          <span class="btn-sub">Monitor seismic în timp real · INFP</span>
        </div>
        <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <button class="app-btn air" onclick="openModule('https://statie-calitate-aer.netlify.app/', 'Stație Calitate Aer', 'normal')">
        <div class="btn-icon">🌿</div>
        <div class="btn-text">
          <span class="btn-label">Stație Calitate Aer</span>
          <span class="btn-sub">8 senzori · Date live Firebase</span>
        </div>
        <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>

    <div class="live-row">
      <div class="live-item"><div class="dot blue"></div>Seismic activ</div>
      <div class="live-item"><div class="dot green"></div>Aer live</div>
    </div>
  </div>
</div>

<!-- ══ VIEWER ══ -->
<div id="viewer">
  <div id="viewer-bar">
    <button id="btn-back" onclick="closeModule()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Înapoi
    </button>
    <span id="viewer-title"></span>
  </div>
  <div id="viewer-frame-wrap">
    <iframe id="viewer-frame" src="" allowfullscreen></iframe>
  </div>
</div>

<script>
  const viewer   = document.getElementById('viewer');
  const frame    = document.getElementById('viewer-frame');
  const landing  = document.getElementById('landing');
  const title    = document.getElementById('viewer-title');

  function openModule(url, name, size) {
    frame.className = size;
    frame.src = url;
    title.textContent = name;
    landing.style.display = 'none';
    viewer.classList.add('active');
    history.pushState({ module: name }, '', '#' + encodeURIComponent(name));
  }

  function closeModule() {
    viewer.classList.remove('active');
    landing.style.display = 'flex';
    frame.src = '';
    if (location.hash) history.back();
  }

  // Android back button support
  window.addEventListener('popstate', function(e) {
    if (viewer.classList.contains('active')) {
      viewer.classList.remove('active');
      landing.style.display = 'flex';
      frame.src = '';
    }
  });
</script>

</body>
</html>
